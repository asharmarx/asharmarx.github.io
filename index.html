</div>

<!-- Travel Container -->
<div id = "travel" class = "container-fluid">
  <div id = "myHorse" class = "carousel slide" data-ride = "carousel">
    <!-- Indicators -->
    <ol class = "carousel-indicators">
      <li data-target = "#myHorse" data-slide-to = "0" class = "active"> </li>
      <li data-target = "#myHorse" data-slide-to = "1"> </li>
      <li data-target = "#myHorse" data-slide-to = "2"> </li>
      <li data-target = "#myHorse" data-slide-to = "3"> </li>
      <li data-target = "#myHorse" data-slide-to = "4"> </li>

    </ol>

    <!-- Wrapper for slides -->
    <div class = "carousel-inner" role = "listbox" >

      <div class = "item active">
        <img src="Images/car_de.jpg"  alt="Germany" height="768" width="1024">

        <div class = "carousel-caption">
          <h2> Wasserberndorf, Germany </h2>
        </div>

      </div>

      <div class = "item">
        <img src="Images/car_stp.jpg" alt="Russia" height="768" width="1024">
        <div class = "carousel-caption">
          <h2> St. Petersburg, Russia </h2>
        </div>
      </div>

      <div class = "item">
        <img src="Images/sunset_es.jpg" alt="Spain" height="768" width="1024">
        <div class = "carousel-caption">
          <h2> L'Albufera, Valencia, Spain </h2>
        </div>
      </div>

      <div class = "item">
        <img src="Images/me_portugal.jpg" alt="Portugal" height="768" width="1024">
        <div class = "carousel-caption">
          <h2> Porto, Portugal </h2>
        </div>
      </div>

    </div>

    <a class="left carousel-control" href="#myHorse" role="button" data-slide="prev">
      <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
      <span class="sr-only">Previous</span>
    </a>

    <a class="right carousel-control" href="#myHorse" role="button" data-slide="next">
      <span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>
      <span class="sr-only">Next</span>
    </a>
  </div>
</div>
